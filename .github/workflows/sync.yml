name: Sync Repository

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Clone Destination Repository
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/sriprasad/reliance-diamond-tools-website-v2.git destination

      - name: Copy Files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ destination/

      - name: Commit and Push
        run: |
          cd destination
          git add .
          git diff --cached --quiet || git commit -m "Sync from source repository"
          git push origin main
